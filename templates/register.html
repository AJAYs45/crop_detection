<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Crop Advisory</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(17, 23, 30, 0.7), rgba(30, 130, 76, 0.8)), url('https://images.unsplash.com/photo-1586771107445-d3ca888129ff?auto=format&fit=crop&q=80') center/cover no-repeat;
            background-attachment: fixed;
            perspective: 1000px; 
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* 🍃 Floating Background Animation */
        .circles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; z-index: -1; }
        .circles li { position: absolute; display: block; list-style: none; width: 20px; height: 20px; background: rgba(255, 255, 255, 0.2); animation: animate 25s linear infinite; bottom: -150px; border-radius: 50%; }
        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        @keyframes animate { 0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; } 100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; border-radius: 50%; } }

        /* 💎 Glassmorphism Card (Wider for 2 columns) */
        .register-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 600px; /* Made wider */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .register-glass:hover {
            transform: translateY(-5px) rotateX(2deg) rotateY(-2deg);
            box-shadow: -10px 25px 50px rgba(0, 0, 0, 0.4);
        }

        .login-logo { font-size: 3rem; color: #ffc107; margin-bottom: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .login-title { color: white; font-weight: bold; margin-bottom: 25px; font-size: 1.6rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* ✨ Input Styling */
        .input-group-text { background: transparent; border: 1px solid rgba(255, 255, 255, 0.5); border-right: none; color: white; }
        .form-control, .form-select {
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-left: none;
            color: white !important;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .form-select option { background: #1e3a2f; color: white; } /* Styling for dropdown options */
        
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #ffc107;
            background: rgba(255, 255, 255, 0.1) !important;
        }
        .input-group:focus-within .input-group-text { border-color: #ffc107; color: #ffc107; }

        /* 🔘 Register Button */
        .btn-register {
            background: linear-gradient(45deg, #e6b800, #ffc107);
            border: none;
            color: #212529;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-register:hover {
            transform: scale(1.03) translateZ(10px);
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.4);
            color: #000;
        }

        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
        .btn-login-link {
            display: inline-block; color: white; border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px; padding: 6px 20px; text-decoration: none; font-weight: bold;
            font-size: 0.85rem; transition: 0.3s; margin-top: 15px;
        }
        .btn-login-link:hover { background: rgba(255, 255, 255, 0.2); border-color: #2ecc71; color: #2ecc71; }
    </style>
</head>
<body>

    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="register-glass animate__animated animate__zoomIn">
        <i class="fa-solid fa-seedling login-logo"></i>
        <h2 class="login-title">Join Farmer Network</h2>
        
        {% if error %}
        <div class="error-msg animate__animated animate__headShake">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST">
            
            <div class="row">
                <div class="col-md-7 mb-3">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-id-badge"></i></span>
                        <input type="text" name="fullname" class="form-control" placeholder="Full Name" required autocomplete="off">
                    </div>
                </div>
                <div class="col-md-5 mb-3">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-calendar-days"></i></span>
                        <input type="number" name="age" class="form-control" placeholder="Age" required min="10" max="100">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                        <input type="text" name="city" class="form-control" placeholder="City / Village" required>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-mound"></i></span>
                        <select name="soil_type" class="form-select" required>
                            <option value=\"\" disabled selected>Select Soil Type</option>
                            <option value="Black Soil">Black Soil (Regur)</option>
                            <option value="Red Soil">Red / Yellow Soil</option>
                            <option value="Alluvial Soil">Alluvial Soil</option>
                            <option value="Laterite Soil">Laterite Soil</option>
                            <option value="Loamy Soil">Loamy Soil</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr style="border-color: rgba(255,255,255,0.3); margin-top: 5px; margin-bottom: 20px;">

            <div class="input-group mb-3 shadow-sm">
                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Choose a Username" required autocomplete="off">
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Create Password" required>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text"><i class="fa-solid fa-check-double"></i></span>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-register w-100 shadow">
                Create Account <i class="fa-solid fa-leaf ms-1"></i>
            </button>
            
            <div class="text-center">
                <a href="/" class="btn-login-link"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
            </div>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
